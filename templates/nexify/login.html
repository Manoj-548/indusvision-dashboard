{% extends 'base.html' %}
{% block title %}Nexify Login - Annotation Platform{% endblock %}
{% block sidebar %}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4>Nexify Login</h4>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-bold">Select Role</label>
            {% for role in roles %}
            <div class="form-check">
              <input class="form-check-input" type="radio" name="role" id="role_{{ role|lower }}" value="{{ role }}" required>
              <label class="form-check-label" for="role_{{ role|lower }}">
                {{ role }}
              </label>
            </div>
            {% endfor %}
          </div>
          <button type="submit" class="btn btn-primary w-100">Enter Nexify as {{ roles.0 }}</button>
        </form>
        <div class="mt-3 text-center">
          <a href="/login/">← IndusVision Main Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
