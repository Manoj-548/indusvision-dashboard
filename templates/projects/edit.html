{% extends 'base.html' %}
{% load static %}

{% block title %}Edit {{ project.name }} | IndusVision{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="card-title mb-3">Edit Project</h2>
          <form action="{% url 'project_update' project.id %}" method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label for="name" class="form-label">Project Name</label>
              <input type="text" class="form-control" id="name" name="name" value="{{ project.name }}" required>
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea class="form-control" id="description" name="description" rows="4">{{ project.description }}</textarea>
            </div>
            <div class="mb-3">
              <label for="classes" class="form-label">Label Classes</label>
              <input type="text" class="form-control" id="classes" name="classes" value="{{ project.classes|join:', ' }}">
              <div class="form-text">Comma-separated list of annotation classes used in this project.</div>
            </div>
            <div class="d-flex justify-content-between">
              <a href="{% url 'project_detail' project.id %}" class="btn btn-secondary">Cancel</a>
              <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
