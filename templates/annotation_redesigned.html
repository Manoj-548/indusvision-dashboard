<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexify AI Annotation Engine</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 13px; }

    body {
      background: #0b1020;
      color: #e0e6ed;
      display: flex;
      flex-direction: column;
    }

    /* ===== TOP TOOLBAR ===== */
    #top-bar {
      height: 44px;
      min-height: 44px;
      background: #141b2d;
      border-bottom: 1px solid #1e2740;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      gap: 10px;
      z-index: 50;
    }

    #top-bar .logo { font-size: 15px; font-weight: 700; color: #4fc3f7; display: flex; align-items: center; gap: 8px; }
    #top-bar .logo span { font-size: 18px; }

    .tool-group { display: flex; align-items: center; gap: 6px; }

    .btn {
      padding: 5px 12px;
      border: 1px solid #2a3550;
      border-radius: 4px;
      background: #1e2740;
      color: #b0bec5;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .btn:hover { background: #2a3550; color: #fff; }
    .btn.active { background: #1565c0; border-color: #1976d2; color: #fff; }
    .btn.success { background: #2e7d32; border-color: #388e3c; color: #fff; }
    .btn.success:hover { background: #388e3c; }
    .btn.danger { background: #c62828; border-color: #d32f2f; color: #fff; }
    .btn.danger:hover { background: #d32f2f; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    select, input[type="text"], input[type="file"] {
      background: #1e2740;
      border: 1px solid #2a3550;
      color: #e0e6ed;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    select:focus, input:focus { outline: none; border-color: #4fc3f7; }

    /* ===== MAIN LAYOUT ===== */
    #main { flex: 1; display: flex; overflow: hidden; }

    /* ===== LEFT SIDEBAR (IMAGES) ===== */
    #left-bar {
      width: 220px;
      min-width: 220px;
      background: #141b2d;
      border-right: 1px solid #1e2740;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 40;
    }

    .panel-header {
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #78909c;
      background: #0f1525;
      border-bottom: 1px solid #1e2740;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-body { flex: 1; overflow-y: auto; padding: 8px; }

    .img-thumb {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius: 4px;
      border: 2px solid transparent;
      cursor: pointer;
      margin-bottom: 6px;
      opacity: 0.7;
      transition: all 0.15s;
      background: #1e2740;
    }

    .img-thumb:hover { opacity: 1; border-color: #4fc3f7; }
    .img-thumb.active { opacity: 1; border-color: #1565c0; }
    .img-thumb.no-image { display: flex; align-items: center; justify-content: center; color: #546e7a; font-size: 11px; background: #1e2740; }

    .file-input-wrap { padding: 8px; border-bottom: 1px solid #1e2740; }
    .file-input-wrap input[type="file"] { width: 100%; font-size: 11px; padding: 4px; }

    /* ===== CANVAS AREA ===== */
    #canvas-wrap {
      flex: 1;
      position: relative;
      background: #0b1020;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #annotation-canvas {
      background: #0d1326;
      cursor: crosshair;
      box-shadow: 0 0 0 1px #1e2740, 0 8px 32px rgba(0,0,0,0.4);
      max-width: 100%;
      max-height: 100%;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(11,16,32,0.85);
      color: #4fc3f7;
      gap: 12px;
      font-size: 13px;
      z-index: 20;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #1e2740;
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* ===== RIGHT SIDEBAR (TOOLS) ===== */
    #right-bar {
      width: 240px;
      min-width: 240px;
      background: #141b2d;
      border-left: 1px solid #1e2740;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 40;
    }

    .tool-section { padding: 10px 12px; border-bottom: 1px solid #1e2740; }
    .tool-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #78909c; margin-bottom: 8px; }

    .class-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 12px;
      margin: 3px;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .class-tag .dot { width: 8px; height: 8px; border-radius: 50%; }
    .class-tag.active { border-color: #fff; box-shadow: 0 0 0 1px rgba(255,255,255,0.1); }

    .anno-item {
      padding: 8px 10px;
      background: #1e2740;
      border-radius: 4px;
      margin-bottom: 6px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .anno-item .anno-type { font-weight: 600; font-size: 10px; text-transform: uppercase; }
    .anno-item .anno-delete { color: #ef5350; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 3px; }
    .anno-item .anno-delete:hover { background: rgba(239,83,80,0.15); }

    .stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; color: #b0bec5; }
    .stat-row .stat-val { color: #fff; font-weight: 600; }

    .coords-display {
      position: absolute;
      bottom: 8px; left: 8px;
      background: rgba(20,27,45,0.9);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      color: #78909c;
      pointer-events: none;
      z-index: 10;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a3550; border-radius: 3px; }

    #toast {
      position: fixed;
      bottom: 20px; right: 20px;
      padding: 12px 18px;
      border-radius: 6px;
      background: #1e2740;
      border: 1px solid #2a3550;
      color: #fff;
      font-size: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 1000;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: #43a047; background: rgba(67,160,71,0.12); }
    #toast.error { border-color: #e53935; background: rgba(229,57,53,0.12); }
  </style>
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <div id="top-bar">
    <div class="logo"><span>🎯</span> Nexify AI Annotation</div>

    <div class="tool-group">
      <button class="btn active" id="mode-bbox" onclick="setMode('bbox')" title="Bounding Box">
        ⬛ BBox
      </button>
      <button class="btn" id="mode-polygon" onclick="setMode('polygon')" title="Polygon">
        🔺 Polygon
      </button>
      <button class="btn" id="mode-smart" onclick="setMode('smart')" title="Smart SAM">
        🧠 Smart
      </button>
      <div style="width:1px;height:20px;background:#2a3550;margin:0 4px;"></div>
      <button class="btn success" onclick="saveAll()" title="Save All">
        💾 Save
      </button>
      <button class="btn danger" onclick="clearAll()" title="Clear All">
        🗑 Clear
      </button>
    </div>

    <div class="tool-group">
      <span id="project-name" style="color:#78909c;font-size:12px;">Loading...</span>
    </div>
  </div>

  <!-- ===== MAIN LAYOUT ===== -->
  <div id="main">

    <!-- ===== LEFT SIDEBAR (IMAGES) ===== -->
    <div id="left-bar">
      <div class="panel-header">
        Images
        <span id="img-count" style="color:#4fc3f7;">0</span>
      </div>
      <div class="file-input-wrap">
        <input type="file" id="file-input" multiple accept="image/*" onchange="handleFiles(this.files)">
      </div>
      <div class="panel-body" id="image-list">
        <div style="color:#546e7a;text-align:center;padding:20px 10px;font-size:12px;">
          Upload images to begin annotating
        </div>
      </div>
    </div>

    <!-- ===== CANVAS AREA ===== -->
    <div id="canvas-wrap">
      <canvas id="annotation-canvas"></canvas>
      <div class="loading-overlay" id="loading" style="display:none;">
        <div class="spinner"></div>
        <span id="loading-text">Processing SAM...</span>
      </div>
      <div class="coords-display" id="coords-display">X: 0, Y: 0</div>
    </div>

    <!-- ===== RIGHT SIDEBAR (TOOLS) ===== -->
    <div id="right-bar">
      <div class="panel-header">Tools</div>

      <!-- Annotation info -->
      <div class="tool-section">
        <div class="tool-section-title">Current Image</div>
        <div class="stat-row"><span>Name</span><span class="stat-val" id="curr-name">-</span></div>
        <div class="stat-row"><span>Size</span><span class="stat-val" id="curr-size">-</span></div>
        <div class="stat-row"><span>ID</span><span class="stat-val" id="curr-id">-</span></div>
      </div>

      <!-- Label Classes -->
      <div class="tool-section">
        <div class="tool-section-title">Label Classes</div>
        <div id="class-list">
          <div class="class-tag active" data-id="" style="background:#1565c020;color:#4fc3f7;border-color:#1565c0;">
            <span class="dot" style="background:#4fc3f7;"></span> Default
          </div>
        </div>
      </div>

      <!-- Annotations List -->
      <div class="tool-section" style="flex:1;display:flex;flex-direction:column;">
        <div class="tool-section-title">Annotations (<span id="anno-count">0</span>)</div>
        <div class="panel-body" id="anno-list" style="padding:0;">
          <div style="color:#546e7a;text-align:center;padding:20px 10px;font-size:12px;">
            No annotations yet
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="tool-section">
        <div class="tool-section-title">Session Stats</div>
        <div class="stat-row"><span>Boxes</span><span class="stat-val" id="stat-boxes">0</span></div>
        <div class="stat-row"><span>Polygons</span><span class="stat-val" id="stat-polygons">0</span></div>
        <div class="stat-row"><span>Smart</span><span class="stat-val" id="stat-smart">0</span></div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
  // ===================== STATE =====================
  let canvas = document.getElementById('annotation-canvas');
  let ctx = canvas.getContext('2d');

  let mode = 'bbox';
  let currentImage = null;      // { id, url, name, width, height, element }
  let currentImageElement = null;

  // Annotations in memory (unsaved)
  let boxes = [];
  let polygons = [];
  let smartPolygons = [];
  let currentPoly = [];   // polygon being drawn

  // Drawing state
  let isDrawing = false;
  let startX = 0, startY = 0;
  let currentMouse = { x: 0, y: 0 };

  // Scale factor: canvas display size vs image natural size
  let scaleX = 1, scaleY = 1;

  // ===================== INIT =====================
  window.addEventListener('DOMContentLoaded', () => {
    loadProjects();
    loadImages();
    resizeCanvas();

    window.addEventListener('resize', resizeCanvas);
  });

  // ===================== RESIZE =====================
  function resizeCanvas() {
    const wrap = document.getElementById('canvas-wrap');
    if (!currentImageElement) {
      canvas.width = wrap.clientWidth - 40;
      canvas.height = wrap.clientHeight - 40;
      canvas.style.width = canvas.width + 'px';
      canvas.style.height = canvas.height + 'px';
      return;
    }
    // Fit image to canvas wrap while preserving aspect ratio
    const maxW = wrap.clientWidth - 20;
    const maxH = wrap.clientHeight - 20;
    const imgW = currentImageElement.naturalWidth;
    const imgH = currentImageElement.naturalHeight;
    const ratio = Math.min(maxW / imgW, maxH / imgH, 1);

    canvas.width = imgW;
    canvas.height = imgH;
    canvas.style.width = (imgW * ratio) + 'px';
    canvas.style.height = (imgH * ratio) + 'px';

    scaleX = imgW / (imgW * ratio);
    scaleY = imgH / (imgH * ratio);
  }

  // ===================== MODE SWITCH =====================
  function setMode(m) {
    mode = m;
    currentPoly = [];
    isDrawing = false;

    document.querySelectorAll('#top-bar .btn').forEach(b => {
      if (b.id && b.id.startsWith('mode-')) b.classList.remove('active');
    });
    document.getElementById('mode-' + m).classList.add('active');
    showToast('Mode: ' + m.toUpperCase());
  }

  // ===================== LOAD PROJECTS =====================
  async function loadProjects() {
    try {
      const r = await fetch('/nexify/api/projects/');
      if (!r.ok) return;
      const data = await r.json();
      const first = (data.projects && data.projects[0]);
      if (first) {
        document.getElementById('project-name').textContent = first.name;
        loadLabelClasses(first.id);
      }
    } catch (e) { console.log('No projects yet'); }
  }

  async function loadLabelClasses(projectId) {
    // Stub - would load real classes
    // const r = await fetch(`/nexify/api/label-classes/${projectId}/`);
  }

  // ===================== LOAD IMAGES =====================
  async function loadImages() {
    try {
      const r = await fetch('/nexify/api/images/');
      if (!r.ok) return;
      const data = await r.json();
      const list = document.getElementById('image-list');
      list.innerHTML = '';
      if (!data.images || !data.images.length) {
        list.innerHTML = '<div style="color:#546e7a;text-align:center;padding:20px 10px;font-size:12px;">Upload images to begin annotating</div>';
        return;
      }
      document.getElementById('img-count').textContent = data.images.length;
      data.images.forEach(img => addImageThumb(img));
    } catch (e) { console.error(e); }
  }

  function addImageThumb(img) {
    const list = document.getElementById('image-list');
    if (list.querySelector('.no-image')) list.innerHTML = '';

    const el = document.createElement('img');
    el.className = 'img-thumb';
    el.src = img.url;
    el.alt = img.name;
    el.dataset.id = img.id;
    el.dataset.url = img.url;
    el.dataset.name = img.name;
    el.dataset.width = img.width || '';
    el.dataset.height = img.height || '';
    el.onclick = () => selectImage(img, el);
    list.appendChild(el);
  }

  // ===================== SELECT IMAGE =====================
  function selectImage(img, thumbEl) {
    // Mark active thumb
    document.querySelectorAll('.img-thumb').forEach(t => t.classList.remove('active'));
    if (thumbEl) thumbEl.classList.add('active');

    currentImage = img;
    document.getElementById('curr-name').textContent = img.name;
    document.getElementById('curr-id').textContent = img.id;

    // Load into canvas
    const i = new Image();
    i.crossOrigin = 'anonymous';
    i.onload = () => {
      currentImageElement = i;
      document.getElementById('curr-size').textContent = i.naturalWidth + ' x ' + i.naturalHeight;
      resizeCanvas();
      clearAnnotations(false); // keep in DB, just clear temp
      loadImageAnnotations(img.id);
      draw();
    };
    i.src = img.url;
  }

  async function loadImageAnnotations(imageId) {
    try {
      const r = await fetch(`/nexify/api/annotations/${imageId}/`);
      if (!r.ok) return;
      const data = await r.json();
      boxes = []; polygons = []; smartPolygons = [];
      (data.annotations || []).forEach(a => {
        if (a.type === 'bbox') boxes.push({ ...a, _saved: true });
        else if (a.type === 'polygon') polygons.push({ ...a, _saved: true });
        else if (a.type === 'smart') smartPolygons.push({ ...a, _saved: true });
      });
      updateAnnoList();
      updateStats();
      draw();
    } catch (e) { console.error(e); }
  }

  // ===================== FILE UPLOAD =====================
  function handleFiles(files) {
    if (!files.length) return;
    const fd = new FormData();
    for (let f of files) fd.append('files', f);

    fetch('/nexify/api/upload-folder/', {
      method: 'POST',
      body: fd,
      headers: { 'X-CSRFToken': getCookie('csrftoken') }
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) { showToast(data.error, true); return; }
      (data.uploaded || []).forEach(u => {
        addImageThumb({ id: u.id, url: u.url, name: u.name });
      });
      document.getElementById('img-count').textContent =
        document.querySelectorAll('.img-thumb').length;
      showToast(`Uploaded ${data.uploaded.length} images`);
      // Auto-select first new image
      if (data.uploaded && data.uploaded[0]) {
        const thumbs = document.querySelectorAll('.img-thumb');
        if (thumbs.length) selectImage(data.uploaded[0], thumbs[thumbs.length - 1]);
      }
    })
    .catch(e => showToast('Upload failed: ' + e.message, true));
  }

  // ===================== MOUSE EVENTS =====================
  function getCanvasPos(e) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) * scaleX,
      y: (e.clientY - r.top) * scaleY
    };
  }

  canvas.addEventListener('mousedown', e => {
    if (!currentImageElement) return;
    const p = getCanvasPos(e);
    if (mode === 'bbox') {
      isDrawing = true;
      startX = p.x; startY = p.y;
    }
  });

  canvas.addEventListener('mousemove', e => {
    if (!currentImageElement) return;
    const p = getCanvasPos(e);
    currentMouse = p;
    document.getElementById('coords-display').textContent = `X: ${Math.round(p.x)}, Y: ${Math.round(p.y)}`;
    if (isDrawing && mode === 'bbox') draw();
    else if (currentPoly.length && mode === 'polygon') draw();
  });

  canvas.addEventListener('mouseup', e => {
    if (!currentImageElement) return;
    if (mode === 'bbox' && isDrawing) {
      const p = getCanvasPos(e);
      const box = [ { x: Math.min(startX, p.x), y: Math.min(startY, p.y) },
                    { x: Math.max(startX, p.x), y: Math.max(startY, p.y) } ];
      if (Math.abs(box[1].x - box[0].x) > 3 && Math.abs(box[1].y - box[0].y) > 3) {
        boxes.push({ data: box, _saved: false });
        updateAnnoList();
        updateStats();
      }
      isDrawing = false;
      draw();
    }
  });

  canvas.addEventListener('click', e => {
    if (!currentImageElement) return;
    if (mode === 'bbox' && !isDrawing) return;
    const p = getCanvasPos(e);
    if (mode === 'polygon') {
      currentPoly.push({ x: p.x, y: p.y });
      draw();
    } else if (mode === 'smart') {
      runSAM(Math.round(p.x), Math.round(p.y));
    }
  });

  canvas.addEventListener('dblclick', e => {
    if (!currentImageElement) return;
    if (mode === 'polygon' && currentPoly.length > 2) {
      polygons.push({ data: [...currentPoly], _saved: false });
      currentPoly = [];
      updateAnnoList();
      updateStats();
      draw();
    }
  });

  // Right-click to cancel polygon
  canvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    if (mode === 'polygon' && currentPoly.length) {
      currentPoly.pop();
      draw();
    }
  });

  // ===================== SAM SMART POLYGON =====================
  async function runSAM(x, y) {
    if (!currentImage) return showToast('Select an image first', true);

    document.getElementById('loading').style.display = 'flex';
    document.getElementById('loading-text').textContent = 'SAM processing...';

    try {
      const r = await fetch('/nexify/api/sam/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({ image_id: currentImage.id, x: x, y: y })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'SAM failed');

      smartPolygons.push({ data: data.data, _saved: false });
      updateAnnoList();
      updateStats();
      draw();
      showToast(`Smart polygon: ${data.data.length} points`);
    } catch (e) {
      showToast('SAM error: ' + e.message, true);
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  // ===================== DRAW =====================
  function draw() {
    if (!currentImageElement) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0d1326';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#546e7a';
      ctx.textAlign = 'center';
      ctx.font = '14px sans-serif';
      ctx.fillText('Select or upload an image to annotate', canvas.width / 2, canvas.height / 2);
      return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(currentImageElement, 0, 0, canvas.width, canvas.height);

    // Boxes
    ctx.strokeStyle = '#00e676';
    ctx.lineWidth = 2 / Math.min(scaleX, scaleY);
    boxes.forEach(b => {
      const pts = b.data || b;
      ctx.strokeRect(pts[0].x, pts[0].y, pts[1].x - pts[0].x, pts[1].y - pts[0].y);
    });

    // Active box drawing
    if (isDrawing && mode === 'bbox') {
      ctx.strokeStyle = '#4fc3f7';
      ctx.setLineDash([5, 5]);
      ctx.strokeRect(startX, startY, currentMouse.x - startX, currentMouse.y - startY);
      ctx.setLineDash([]);
    }

    // Polygons
    ctx.strokeStyle = '#ff9100';
    ctx.lineWidth = 2 / Math.min(scaleX, scaleY);
    polygons.forEach(poly => {
      drawPolyPath(poly.data || poly, false);
    });

    // Smart polygons
    ctx.strokeStyle = '#e040fb';
    smartPolygons.forEach(poly => {
      drawPolyPath(poly.data || poly, true);
    });

    // Current polygon being drawn
    if (currentPoly.length) {
      ctx.strokeStyle = '#ff9100';
      ctx.lineWidth = 2 / Math.min(scaleX, scaleY);
      ctx.beginPath();
      currentPoly.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      });
      if (currentPoly.length > 1) ctx.lineTo(currentMouse.x, currentMouse.y);
      ctx.stroke();

      // Draw points
      ctx.fillStyle = '#ff9100';
      currentPoly.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4 / Math.min(scaleX, scaleY), 0, Math.PI * 2);
        ctx.fill();
      });
    }
  }

  function drawPolyPath(points, fill) {
    if (!points || points.length < 3) return;
    ctx.beginPath();
    points.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    if (fill) {
      ctx.fillStyle = 'rgba(224,64,251,0.15)';
      ctx.fill();
    }
    ctx.stroke();
  }

  // ===================== ANNOTATION LIST =====================
  function updateAnnoList() {
    const list = document.getElementById('anno-list');
    const all = [
      ...boxes.map(b => ({ ...b, _type: 'bbox', label: 'Box' })),
      ...polygons.map(p => ({ ...p, _type: 'polygon', label: 'Poly' })),
      ...smartPolygons.map(p => ({ ...p, _type: 'smart', label: 'Smart' })),
    ];
    document.getElementById('anno-count').textContent = all.length;

    if (!all.length) {
      list.innerHTML = '<div style="color:#546e7a;text-align:center;padding:20px 10px;font-size:12px;">No annotations yet</div>';
      return;
    }

    list.innerHTML = '';
    all.forEach((a, idx) => {
      const el = document.createElement('div');
      el.className = 'anno-item';
      el.innerHTML = `<div><span class="anno-type" style="color:${
        a._type==='bbox'?'#00e676':a._type==='polygon'?'#ff9100':'#e040fb'
      }">${a.label}</span><span style="color:#78909c;margin-left:6px;">#${idx+1}</span></div>
      <span class="anno-delete" onclick="deleteAnno('${a._type}', ${idx})">×</span>`;
      list.appendChild(el);
    });
  }

  function deleteAnno(type, idx) {
    if (type === 'bbox') boxes.splice(idx, 1);
    else if (type === 'polygon') polygons.splice(idx, 1);
    else if (type === 'smart') smartPolygons.splice(idx, 1);
    updateAnnoList();
    updateStats();
    draw();
  }

  function updateStats() {
    document.getElementById('stat-boxes').textContent = boxes.length;
    document.getElementById('stat-polygons').textContent = polygons.length;
    document.getElementById('stat-smart').textContent = smartPolygons.length;
  }

  // ===================== SAVE / CLEAR =====================
  async function saveAll() {
    if (!currentImage) return showToast('No image selected', true);

    let saved = 0;
    const headers  = {
      'Content-Type': 'application/json',
      'X-CSRFToken': getCookie('csrftoken')
    };

    for (const b of boxes.filter(b => !b._saved)) {
      await fetch('/nexify/api/annotate/', {
        method: 'POST', headers, body: JSON.stringify({
          image_id: currentImage.id, type: 'bbox', data: b.data
        })
      });
      b._saved = true; saved++;
    }
    for (const p of polygons.filter(p => !p._saved)) {
      await fetch('/nexify/api/annotate/', {
        method: 'POST', headers, body: JSON.stringify({
          image_id: currentImage.id, type: 'polygon', data: p.data
        })
      });
      p._saved = true; saved++;
    }
    for (const p of smartPolygons.filter(p => !p._saved)) {
      await fetch('/nexify/api/annotate/', {
        method: 'POST', headers, body: JSON.stringify({
          image_id: currentImage.id, type: 'smart', data: p.data
        })
      });
      p._saved = true; saved++;
    }

    updateAnnoList();
    showToast(`Saved ${saved} annotations`);
  }

  function clearAll() {
    boxes = []; polygons = []; smartPolygons = []; currentPoly = []; isDrawing = false;
    updateAnnoList();
    updateStats();
    draw();
    showToast('Annotations cleared (not saved)');
  }

  function clearAnnotations(full) {
    boxes = []; polygons = []; smartPolygons = []; currentPoly = []; isDrawing = false;
    updateAnnoList();
    updateStats();
  }

  // ===================== UTILS =====================
  function showToast(msg, error) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = error ? 'error' : 'success';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function getCookie(name) {
    let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
    return v ? v[2] : '';
  }

  // Initial draw
  draw();
  </script>
</body>
