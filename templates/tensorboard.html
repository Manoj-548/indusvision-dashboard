{% extends 'base.html' %}
{% block title %}TensorBoard - IndusVision{% endblock %}
{% block content %}
<div class="row">
  <div class="col-md-12">
<h2>TensorBoard</h2>
<button id="startTbBtn" class="btn btn-primary mb-3">Start TensorBoard</button>
<div id="tbStatus" class="alert alert-info">Click Start if not running.</div>
<a href="http://localhost:6006" target="_blank" rel="noopener" class="btn btn-secondary mb-3">Open New Tab</a>
    <iframe src="http://localhost:6006" width="100%" height="90vh" frameborder="0"></iframe>
  </div>
</div>
<p>To use: Run training with TensorBoard logger, logs saved to <code>tensorboard_logs/</code>.</p>

<script>
function startTB() {
  const btn = document.getElementById('startTbBtn');
  const status = document.getElementById('tbStatus');
  btn.disabled = true;
  btn.textContent = 'Starting...';
  fetch('/dashboard/start-tensorboard/', {method: 'POST'})
    .then(r => r.json())
    .then(data => {
      status.innerHTML = `Status: ${data.status}` + (data.pid ? ` PID: ${data.pid}` : '');
      btn.textContent = 'Refresh';
      btn.disabled = false;
      setTimeout(() => location.reload(), 2000);
    })
    .catch(e => {
      status.innerHTML = 'Error: ' + e;
      btn.textContent = 'Start TensorBoard';
      btn.disabled = false;
    });
}
document.getElementById('startTbBtn').onclick = startTB;
</script>
{% endblock %}
