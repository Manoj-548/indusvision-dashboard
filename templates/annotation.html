<div class="card-body">

    <h5 class="mb-3">AI Annotation Assistant</h5>

    <!-- ================= AI BUTTON ================= -->
    <button class="btn btn-success mt-2" onclick="getAISuggestion()">
        Get AI Suggestion
    </button>

    <!-- Output container -->
    <div id="ai-output" class="mt-3"></div>

</div>


<!-- ================= SCRIPT ================= -->
<script>

// ---------- CSRF TOKEN ----------
function getCSRFToken() {
    let cookieValue = null;

    if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");

        for (let cookie of cookies) {
            cookie = cookie.trim();

            if (cookie.startsWith("csrftoken=")) {
                cookieValue = cookie.substring("csrftoken=".length);
                break;
            }
        }
    }

    return cookieValue;
}


// ---------- AI SUGGEST API ----------
function getAISuggestion() {
    console.log("🚀 Requesting AI suggestions...");

    fetch("/api/ai-suggest/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            input: "sample image data"
        })
    })
    .then(response => {
        console.log("Status:", response.status);

        if (!response.ok) {
            throw new Error("HTTP error " + response.status);
        }

        return response.json();
    })
    .then(data => {
        console.log("✅ AI Response:", data);

        document.getElementById("ai-output").innerHTML = `
            <div class="alert alert-success">
                <strong>AI Suggestions:</strong><br>
                ${data.suggestions.join(", ")}
            </div>
        `;
    })
    .catch(error => {
        console.error("❌ Error:", error);

        document.getElementById("ai-output").innerHTML = `
            <div class="alert alert-danger">
                <strong>Error:</strong> ${error.message}
            </div>
        `;
    });
}

</script>
