<h2>Annotation Tool</h2>

<button onclick="getAISuggestion()">AI Suggest</button>

<script>
function getAISuggestion(){
    fetch("/api/ai-suggest/", {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {
        console.log("AI Suggestion:", data);
        alert(JSON.stringify(data));
    });
}
</script>
