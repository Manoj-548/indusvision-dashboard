{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace - Annotation Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a14;
            color: #fff;
        }
        
        .container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 28px;
            color: #fff;
        }
        
        .btn {
            padding: 10px 20px;
            background: #0f3460;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .btn-primary {
            background: #e94560;
        }
        
        .btn-primary:hover {
            background: #cc384e;
        }
        
        .btn:hover {
            background: #16213e;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .project-card {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 20px;
            border: 2px solid #16213e;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .project-card:hover {
            border-color: #e94560;
            transform: translateY(-5px);
        }
        
        .project-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .project-type {
            display: inline-block;
            background: #0f3460;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #a0a0a0;
            margin-bottom: 15px;
        }
        
        .project-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .stat {
            background: #0a0a14;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #00d9a5;
        }
        
        .stat-label {
            font-size: 11px;
            color: #a0a0a0;
            margin-top: 3px;
        }
        
        .project-actions {
            display: flex;
            gap: 10px;
        }
        
        .project-actions button {
            flex: 1;
            padding: 8px;
            background: #0f3460;
            border: none;
            color: #fff;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .project-actions button:hover {
            background: #16213e;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a0;
        }
        
        .empty-state h2 {
            margin-bottom: 10px;
            color: #fff;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.open {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-size: 13px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            background: #0a0a14;
            color: #fff;
            border: 1px solid #16213e;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #0a0a14;
            color: #fff;
            border: 1px solid #16213e;
            border-radius: 4px;
            font-size: 13px;
            min-height: 80px;
            resize: vertical;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }
        
        .cancel-btn {
            background: #16213e;
            color: #fff;
        }
        
        .cancel-btn:hover {
            background: #0f3460;
        }
        
        .submit-btn {
            background: #e94560;
            color: #fff;
        }
        
        .submit-btn:hover {
            background: #cc384e;
        }
        
        .breadcrumb {
            color: #a0a0a0;
            font-size: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <a href="/annotation/" style="color: #e94560; text-decoration: none;">Dashboard</a>
            <span> > </span>
            <span>{{ workspace.name }}</span>
        </div>
        
        <!-- Header -->
        <div class="header">
            <div>
                <h1>{{ workspace.name }}</h1>
                <p style="color: #a0a0a0; margin-top: 5px;">{{ workspace.projects.count }} Projects</p>
            </div>
            <button class="btn btn-primary" onclick="openCreateProjectModal()">+ New Project</button>
        </div>
        
        <!-- Projects Grid -->
        <div id="projectsContainer">
            <div class="projects-grid" id="projectsList"></div>
        </div>
    </div>
    
    <!-- Create Project Modal -->
    <div class="modal" id="createProjectModal">
        <div class="modal-content">
            <div class="modal-title">Create New Project</div>
            
            <form onsubmit="createProject(event)">
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="projectName" placeholder="Enter project name" required>
                </div>
                
                <div class="form-group">
                    <label>Project Type</label>
                    <select id="projectType" required>
                        <option value="object">Object Detection</option>
                        <option value="image">Image Classification</option>
                        <option value="segmentation">Semantic Segmentation</option>
                        <option value="keypoint">Keypoint Detection</option>
                        <option value="video">Video Tracking</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="projectDescription" placeholder="Enter project description (optional)"></textarea>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" onclick="closeCreateProjectModal()">Cancel</button>
                    <button type="submit" class="submit-btn">Create Project</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const workspaceId = {{ workspace.id }};
        
        // Initialize
        loadProjects();
        
        async function loadProjects() {
            const res = await fetch(`/annotation/api/workspaces/${workspaceId}/projects/`);
            const data = await res.json();
            
            const container = document.getElementById('projectsList');
            if (data.projects.length === 0) {
                document.getElementById('projectsContainer').innerHTML = `
                    <div class="empty-state">
                        <h2>No Projects Yet</h2>
                        <p>Create your first annotation project to get started</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = data.projects.map(project => `
                <div class="project-card">
                    <div class="project-title">${project.name}</div>
                    <div class="project-type">${project.project_type}</div>
                    
                    <div class="project-stats">
                        <div class="stat">
                            <div class="stat-value">${project.image_count}</div>
                            <div class="stat-label">Images</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">0</div>
                            <div class="stat-label">Completed</div>
                        </div>
                    </div>
                    
                    <div class="project-actions">
                        <button onclick="openProject(${project.id})">Open</button>
                        <button onclick="deleteProject(${project.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function openCreateProjectModal() {
            document.getElementById('createProjectModal').classList.add('open');
        }
        
        function closeCreateProjectModal() {
            document.getElementById('createProjectModal').classList.remove('open');
        }
        
        async function createProject(e) {
            e.preventDefault();
            
            const projectData = {
                name: document.getElementById('projectName').value,
                project_type: document.getElementById('projectType').value,
                description: document.getElementById('projectDescription').value,
                classes: []
            };
            
            const res = await fetch(`/annotation/api/workspaces/${workspaceId}/projects/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(projectData)
            });
            
            if (res.ok) {
                alert('Project created successfully!');
                closeCreateProjectModal();
                loadProjects();
            } else {
                alert('Error creating project');
            }
        }
        
        function openProject(projectId) {
            window.location.href = `/annotation/api/workspaces/${workspaceId}/projects/${projectId}/`;
        }
        
        async function deleteProject(projectId) {
            if (confirm('Are you sure you want to delete this project?')) {
                await fetch(`/annotation/api/workspaces/${workspaceId}/projects/${projectId}/`, {
                    method: 'DELETE'
                });
                loadProjects();
            }
        }
    </script>
</body>
</html>
