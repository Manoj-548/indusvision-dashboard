 <script>
    const canvas = document.getElementById('annotationCanvas');
    const ctx = canvas.getContext('2d');

// imageId read from data attribute
const imageId = parseInt(document.body.dataset.imageId || '0');
const projectId = "{{ image.project.id|default:'' }}";
const workspaceId = "{{ image.project.workspace.id|default:'' }}";

const imageFile = "{{ image.image_file.url|default:'' }}";

    let imgObj = new Image();
    imgObj.crossOrigin = "anonymous";

    imgObj.onload = () => {
        resizeCanvas();
        drawImage();
    };

    imgObj.src = imageFile;

    let annotations = [];
    let currentTool = 'bbox';
    let isDrawing = false;
    let startX, startY;

    function resizeCanvas() {
        const container = canvas.parentElement;
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        drawImage();
    }

    function drawImage() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const scale = Math.min(canvas.width / imgObj.width, canvas.height / imgObj.height);
        const x = (canvas.width - imgObj.width * scale) / 2;
        const y = (canvas.height - imgObj.height * scale) / 2;

        ctx.drawImage(imgObj, x, y, imgObj.width * scale, imgObj.height * scale);

        canvas.offsetX = x;
        canvas.offsetY = y;
        canvas.scale = scale;
    }

    function drawAnnotations() {
        drawImage();
        annotations.forEach(ann => {
            const color = document.getElementById('colorPicker').value;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;

            ctx.strokeRect(ann.x1, ann.y1, ann.x2 - ann.x1, ann.y2 - ann.y1);
            ctx.fillStyle = color;
            ctx.fillText(ann.label, ann.x1, ann.y1 - 5);
        });
    }

    canvas.addEventListener('mousedown', (e) => {
        if (currentTool === 'bbox') {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        if (isDrawing) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            drawImage();
            ctx.strokeStyle = document.getElementById('colorPicker').value;
            ctx.strokeRect(startX, startY, x - startX, y - startY);
        }
    });

    canvas.addEventListener('mouseup', (e) => {
        if (isDrawing) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const classVal = document.getElementById('classList').value;

            annotations.push({
                type: 'bbox',
                x1: Math.min(startX, x),
                y1: Math.min(startY, y),
                x2: Math.max(startX, x),
                y2: Math.max(startY, y),
                label: classVal
            });

            drawAnnotations();
            updateAnnotationsList();
            isDrawing = false;
        }
    });

    document.getElementById('bboxTool').addEventListener('click', (e) => {
        currentTool = 'bbox';
        document.querySelectorAll('.tool-group button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
    });

    document.getElementById('undoBtn').addEventListener('click', () => {
        annotations.pop();
        drawAnnotations();
        updateAnnotationsList();
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        annotations = [];
        drawAnnotations();
        updateAnnotationsList();
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
        for (const ann of annotations) {
            await fetch(`/annotation/api/workspaces/${workspaceId}/projects/${projectId}/images/${imageId}/annotations/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    class_name: ann.label,
                    annotation_type: 'bbox',
                    x_min: ann.x1 / canvas.scale,
                    y_min: ann.y1 / canvas.scale,
                    x_max: ann.x2 / canvas.scale,
                    y_max: ann.y2 / canvas.scale
                })
            });
        }
        alert('Annotations saved!');
    });

    function updateAnnotationsList() {
        const list = document.getElementById('annotationsList');

        list.innerHTML = annotations.map((ann, i) => `
            <div class="annotation-item">
                <span>${ann.label}</span>
                <button class="delete-btn" onclick="deleteAnnotation(${i})">Delete</button>
            </div>
        `).join('');

        document.getElementById('totalAnn').textContent = annotations.length;
    }

    function deleteAnnotation(index) {
        annotations.splice(index, 1);
        drawAnnotations();
        updateAnnotationsList();
    }

    window.addEventListener('resize', resizeCanvas);
    updateAnnotationsList();
</script>
