{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annotation Workspaces</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a14;
            color: #fff;
        }
        
        .container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 28px;
            color: #fff;
        }
        
        .btn {
            padding: 10px 20px;
            background: #0f3460;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .btn-primary {
            background: #e94560;
        }
        
        .btn-primary:hover {
            background: #cc384e;
        }
        
        .btn:hover {
            background: #16213e;
        }
        
        .workspaces-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .workspace-card {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 20px;
            border: 2px solid #16213e;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .workspace-card:hover {
            border-color: #e94560;
            transform: translateY(-5px);
        }
        
        .workspace-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .workspace-description {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .workspace-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .stat {
            background: #0a0a14;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #00d9a5;
        }
        
        .stat-label {
            font-size: 11px;
            color: #a0a0a0;
            margin-top: 3px;
        }
        
        .workspace-actions {
            display: flex;
            gap: 10px;
        }
        
        .workspace-actions button {
            flex: 1;
            padding: 8px;
            background: #0f3460;
            border: none;
            color: #fff;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .workspace-actions button:hover {
            background: #16213e;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a0;
        }
        
        .empty-state h2 {
            margin-bottom: 10px;
            color: #fff;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.open {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-size: 13px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #0a0a14;
            color: #fff;
            border: 1px solid #16213e;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }
        
        .cancel-btn {
            background: #16213e;
            color: #fff;
        }
        
        .cancel-btn:hover {
            background: #0f3460;
        }
        
        .submit-btn {
            background: #e94560;
            color: #fff;
        }
        
        .submit-btn:hover {
            background: #cc384e;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>Annotation Workspaces</h1>
                <p style="color: #a0a0a0; margin-top: 5px;">Manage your annotation projects</p>
            </div>
            <button class="btn btn-primary" onclick="openCreateWorkspaceModal()">+ New Workspace</button>
        </div>
        
        <!-- Workspaces Grid -->
        <div id="workspacesContainer">
            <div class="workspaces-grid" id="workspacesList"></div>
        </div>
    </div>
    
    <!-- Create Workspace Modal -->
    <div class="modal" id="createWorkspaceModal">
        <div class="modal-content">
            <div class="modal-title">Create New Workspace</div>
            
            <form onsubmit="createWorkspace(event)">
                <div class="form-group">
                    <label>Workspace Name</label>
                    <input type="text" id="workspaceName" placeholder="Enter workspace name" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="workspaceDescription" placeholder="Enter workspace description (optional)"></textarea>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" onclick="closeCreateWorkspaceModal()">Cancel</button>
                    <button type="submit" class="submit-btn">Create Workspace</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Initialize
        loadWorkspaces();
        
        async function loadWorkspaces() {
            const res = await fetch('/annotation/api/workspaces/');
            const data = await res.json();
            
            const container = document.getElementById('workspacesList');
            if (data.workspaces.length === 0) {
                document.getElementById('workspacesContainer').innerHTML = `
                    <div class="empty-state">
                        <h2>No Workspaces Yet</h2>
                        <p>Create your first workspace to get started with annotation</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = data.workspaces.map(workspace => `
                <div class="workspace-card" onclick="openWorkspace(${workspace.id})">
                    <div class="workspace-title">${workspace.name}</div>
                    <div class="workspace-description">${workspace.description || 'No description'}</div>
                    
                    <div class="workspace-stats">
                        <div class="stat">
                            <div class="stat-value">${workspace.project_count}</div>
                            <div class="stat-label">Projects</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${workspace.total_images}</div>
                            <div class="stat-label">Images</div>
                        </div>
                    </div>
                    
                    <div class="workspace-actions">
                        <button onclick="event.stopPropagation(); openWorkspace(${workspace.id})">Open</button>
                        <button onclick="event.stopPropagation(); deleteWorkspace(${workspace.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function openCreateWorkspaceModal() {
            document.getElementById('createWorkspaceModal').classList.add('open');
        }
        
        function closeCreateWorkspaceModal() {
            document.getElementById('createWorkspaceModal').classList.remove('open');
        }
        
        async function createWorkspace(e) {
            e.preventDefault();
            
            const workspaceData = {
                name: document.getElementById('workspaceName').value,
                description: document.getElementById('workspaceDescription').value
            };
            
            const res = await fetch('/annotation/api/workspaces/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(workspaceData)
            });
            
            if (res.ok) {
                alert('Workspace created successfully!');
                closeCreateWorkspaceModal();
                loadWorkspaces();
            } else {
                alert('Error creating workspace');
            }
        }
        
        function openWorkspace(workspaceId) {
            window.location.href = `/annotation/${workspaceId}/`;
        }
        
        async function deleteWorkspace(workspaceId) {
            if (confirm('Are you sure you want to delete this workspace?')) {
                await fetch(`/annotation/api/workspaces/${workspaceId}/`, {
                    method: 'DELETE'
                });
                loadWorkspaces();
            }
        }
    </script>
</body>
</html>
